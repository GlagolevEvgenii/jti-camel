<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta content="telephone=no" name="format-detection"/>
  <title>Jti Winston</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="css/main.css" rel="stylesheet" type="text/css">
</head>

<body>
<main class="main-bg">
  <div class="container">
    <div class="main-content">
      <img src="img/logo.png" alt="logo" class="img-logo">
      <img src="img/camel_compact_blue.png" alt="camel" class="img-camel">
      <img src="img/year.png" alt="year" class="img-year">
      <div class="items-holder">
        <div class="item">
          <div class="item-icon">
            <img src="img/icons/camel-icon.svg" alt="ხელით">
          </div>
          <p class="item-text">ქემელის მაღალი ხარისხი</p>
        </div>
        <div class="item">
          <div class="item-icon">
            <img src="img/icons/dots-icon.svg" alt="ხელით">
          </div>
          <p class="item-text">კომპაქტური ფორმატი</p>
        </div>
        <div class="item">
          <div class="item-icon">
            <img src="img/icons/price-icon.svg" alt="ხელით">
          </div>
          <p class="item-text">ფასი*</p>
        </div>
        <div class="item">
          <div class="item-icon">
            <img src="img/icons/lss-icon.svg" alt="ხელით">
          </div>
          <p class="item-text">LSS ტექნოლოგია</p>
        </div>
        <div class="item">
          <div class="item-icon">
            <img src="img/icons/eight-icon.svg" alt="ხელით">
          </div>
          <p class="item-text">კუპრის შემცველობა**</p>
        </div>
      </div>
      <div class="checkbox-row">
        <label for="checkbox" class="row-text">
          <input type="checkbox" id="checkbox">
          <span> ვაცხადებ, რომ წავიკითხე და <br> ვეთანხმები პერსონალური მონაცემების <br> დაცვის პოლიტიკას.</span>
        </label>
      </div>
      <div class="bottom-holder">
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow"> შემდეგი</button>
        <a href="#" class="link">გამოწერის გაუქმება</a>
      </div>
    </div>
  </div>

</main>
<footer class="footer">
  <img src="img/footer.png" alt="footer-image">
</footer>

</body>

</html>

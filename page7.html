<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta content="telephone=no" name="format-detection"/>
  <title>Camel Compact Blue</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="css/main.css" rel="stylesheet" type="text/css">
</head>
<body>
<main class="regular-bg last-mode">
  <div class="container">
    <div class="regular-content">
      <div class="icon-content">
        <h1 class="regular-title mb-75">
          გამოწერის <br> გაუქმება
        </h1>
        <img src="img/icons/mail.svg" alt="mail" class="img-icon">
        <p class="regular-text mb-25" >
          გთხოვთ, გვითხრათ, რატომ <br>
          გსურთ გამოწერის გაუქმება:
        </p>
      </div>
      <div class="buttons-wrap">
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow">
          არ ვარ დაინტერესებული
          <br>
          ასეთი შეთავაზებებით
        </button>
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow">
          არასდროს გამომიწერია
        </button>
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow">
          არ ვეწევი
        </button>
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow">
          სხვა მიზეზი
        </button>
        <button class="btn"> <img src="img/icons/arrow-right.svg" alt="arrow-right" class="icon-arrow">
          არ მინდა მიზეზის დასახელება
        </button>
      </div>
    </div>
  </div>
</main>
<footer class="footer">
  <img src="img/footer.png" alt="footer-image">
</footer>
</body>
</html>
